# /etc/nginx/sites-available/kulahr
# Symlink to /etc/nginx/sites-enabled/kulahr to activate.
#
# Handles kulahr.com (marketing/signup) AND *.kulahr.com (tenant subdomains).
# Cloudflare sits in front (Flexible SSL) — so EC2 only receives HTTP.
# X-Forwarded-Proto is set to "https" so Rails treats all requests as secure.

upstream kulahr_puma {
  server 127.0.0.1:3000 fail_timeout=0;
}

server {
  listen 80;
  server_name kulahr.com *.kulahr.com;

  root /var/www/kulahr/public;

  # Let Cloudflare/load balancer connect; block direct HTTP from the internet
  # (optional — remove if you want direct HTTP access during initial setup)
  # allow CLOUDFLARE_IP_RANGE;
  # deny all;

  # ── Static assets (served directly — bypasses Rails) ───────────────────────
  location /assets {
    expires 1y;
    add_header Cache-Control "public, immutable";
    gzip_static on;
    access_log off;
  }

  # ── Rails health check ──────────────────────────────────────────────────────
  location /up {
    proxy_pass         http://kulahr_puma;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    access_log off;
  }

  # ── All other requests → Puma ───────────────────────────────────────────────
  location / {
    # Serve pre-existing static files first (e.g. error pages)
    try_files $uri/index.html $uri @puma;
  }

  location @puma {
    proxy_pass            http://kulahr_puma;
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $remote_addr;
    proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
    # Hardcode https — Cloudflare Flexible SSL sends HTTP to EC2 but browser
    # is on HTTPS. Combined with config.assume_ssl = true in production.rb,
    # Rails correctly treats all requests as secure.
    proxy_set_header      X-Forwarded-Proto https;
    proxy_redirect        off;
    proxy_read_timeout    300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;
    # Required for Turbo Streams / SSE
    proxy_buffering       off;
  }

  # ── Gzip ────────────────────────────────────────────────────────────────────
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_proxied    any;
  gzip_vary       on;
  gzip_types
    text/plain text/css text/javascript text/xml text/x-component
    application/json application/javascript application/xml
    application/rss+xml font/truetype font/opentype image/svg+xml;

  client_max_body_size 10M;
}
