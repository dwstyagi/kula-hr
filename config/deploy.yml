# Kamal config — not used. Deployment is via GitHub Actions + SSH.
# See .github/workflows/deploy.yml and bin/setup_server.sh.
service: hrms
image: hrms
servers:
  web:
    - 192.168.0.1
registry:
  server: localhost:5555
env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
volumes:
  - "hrms_storage:/rails/storage"
asset_path: /rails/public/assets
builder:
  arch: amd64
